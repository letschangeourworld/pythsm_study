version: "3.9"
 
networks:
  uwb-net:
    driver: bridge
 
volumes:
  postgres_data:
  redis_data:
  redpanda_data:
 
services:
  # ─── Nginx ───────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: uwb-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - fastapi
    networks:
      - uwb-net
    restart: unless-stopped
 
  # ─── FastAPI ──────────────────────────────────────────────
  fastapi:
    build:
      context: ./fastapi
      dockerfile: Dockerfile
    container_name: uwb-fastapi
    environment:
      - DATABASE_URL=postgresql+asyncpg://uwb:uwbpass@postgres:5432/uwbdb
      - REDIS_URL=redis://redis:6379
      - KAFKA_BOOTSTRAP=redpanda:9092
      - SECRET_KEY=change-me-in-production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      redpanda:
        condition: service_healthy
    networks:
      - uwb-net
    restart: unless-stopped
    # 3개 replica 가능: docker compose up --scale fastapi=3
    expose:
      - "8000"
 
  # ─── Location Consumer (멀티 인스턴스) ────────────────────
  location-consumer:
    build:
      context: ./fastapi
      dockerfile: Dockerfile
    container_name: uwb-location-consumer
    command: python -m app.workers.location_consumer
    environment:
      - DATABASE_URL=postgresql+asyncpg://uwb:uwbpass@postgres:5432/uwbdb
      - REDIS_URL=redis://redis:6379
      - KAFKA_BOOTSTRAP=redpanda:9092
      - CONSUMER_GROUP=location-group
    depends_on:
      - redpanda
      - postgres
      - redis
    networks:
      - uwb-net
    restart: unless-stopped
    deploy:
      replicas: 3  # 50~100 태그 분산처리용
 
  # ─── AI Worker ────────────────────────────────────────────
  ai-worker:
    build:
      context: ./ai-worker
      dockerfile: Dockerfile
    container_name: uwb-ai-worker
    environment:
      - KAFKA_BOOTSTRAP=redpanda:9092
      - REDIS_URL=redis://redis:6379
      - CONSUMER_GROUP=ai-anomaly-group
    depends_on:
      - redpanda
      - redis
    networks:
      - uwb-net
    restart: unless-stopped
    deploy:
      replicas: 2
 
  # ─── Redpanda (Kafka compatible) ──────────────────────────
  redpanda:
    image: redpandadata/redpanda:latest
    container_name: uwb-redpanda
    command:
      - redpanda start
      - --smp 2
      - --memory 1G
      - --reserve-memory 0M
      - --overprovisioned
      - --node-id 0
      - --kafka-addr PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr PLAINTEXT://redpanda:9092
      - --pandaproxy-addr 0.0.0.0:8082
      - --advertise-pandaproxy-addr redpanda:8082
      - --schema-registry-addr 0.0.0.0:8081
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD", "rpk", "cluster", "info"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - uwb-net
    restart: unless-stopped
 
  # Redpanda 토픽 자동 생성
  redpanda-init:
    image: redpandadata/redpanda:latest
    container_name: uwb-redpanda-init
    depends_on:
      redpanda:
        condition: service_healthy
    networks:
      - uwb-net
    entrypoint: |
      bash -c "
        rpk --brokers redpanda:9092 topic create tag-location --partitions 6 --replicas 1 || true
        rpk --brokers redpanda:9092 topic create anomaly-detection --partitions 3 --replicas 1 || true
        rpk --brokers redpanda:9092 topic create location-events --partitions 6 --replicas 1 || true
        echo 'Topics created.'
      "
    restart: "no"
 
  # Redpanda Console (관리 UI)
  redpanda-console:
    image: redpandadata/console:latest
    container_name: uwb-redpanda-console
    environment:
      - KAFKA_BROKERS=redpanda:9092
    ports:
      - "8080:8080"
    depends_on:
      - redpanda
    networks:
      - uwb-net
    restart: unless-stopped
 
  # ─── Redis ────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: uwb-redis
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - uwb-net
    restart: unless-stopped
 
  # ─── PostgreSQL ───────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: uwb-postgres
    environment:
      - POSTGRES_USER=uwb
      - POSTGRES_PASSWORD=uwbpass
      - POSTGRES_DB=uwbdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U uwb -d uwbdb"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - uwb-net
    restart: unless-stopped