global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alerts.yml"

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node'
    static_configs:
      - targets: ['ts_node_exporter:9100']

  - job_name: 'postgres'
    static_configs:
      - targets: ['ts_postgres_exporter:9187']

  - job_name: 'redis'
    static_configs:
      - targets: ['ts_redis_exporter:9121']

  - job_name: 'livekit'
    static_configs:
      - targets: ['ts_livekit:6789']
    metrics_path: '/metrics'

  - job_name: 'api'
    static_configs:
      - targets: ['ts_api:8000']
    metrics_path: '/metrics'
