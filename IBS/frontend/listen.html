<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Vitna Live Interpretation</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Sans+JP:wght@300;400;700&family=Noto+Sans+SC:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold:#C9A84C; --gold2:#E8D5A3;
      --dark:#0D1117; --bg:#111827;
      --panel:#1A2235; --panel2:#1F2B3E; --border:#2A3A52;
      --text:#E8F0FE; --muted:#7A8FA6;
      --green:#4ADE80; --red:#F87171; --blue:#60A5FA;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Noto Sans KR','Segoe UI Emoji','Apple Color Emoji','Noto Color Emoji',sans-serif;
      height: 100dvh; display: flex; flex-direction: column; overflow: hidden;
    }
    body.lang-japanese { font-family: 'Noto Sans JP','Segoe UI Emoji','Apple Color Emoji',sans-serif; }
    body.lang-chinese  { font-family: 'Noto Sans SC','Segoe UI Emoji','Apple Color Emoji',sans-serif; }

    /* ── 닉네임 모달 ── */
    .nick-overlay {
      position: fixed; inset: 0; z-index: 300;
      background: rgba(0,0,0,.88); backdrop-filter: blur(10px);
      display: flex; align-items: center; justify-content: center; padding: 20px;
    }
    .nick-overlay.hidden { display: none; }
    .nick-modal {
      background: linear-gradient(135deg,#1a2235,#1f2b3e);
      border: 1px solid rgba(201,168,76,.25); border-radius: 24px;
      padding: 32px 24px 24px; width: 100%; max-width: 340px;
      display: flex; flex-direction: column; gap: 16px;
    }
    .nick-title { font-size: 17px; font-weight: 700; color: var(--gold); text-align: center; }
    .nick-desc  { font-size: 12px; color: var(--muted); text-align: center; line-height: 1.8; }
    .nick-field {
      width: 100%; background: rgba(255,255,255,.06);
      border: 1.5px solid var(--border); border-radius: 12px;
      padding: 14px 16px; font-size: 16px; color: var(--text);
      font-family: inherit; outline: none; text-align: center; transition: all .2s;
    }
    .nick-field:focus { border-color: var(--gold); }
    .nick-counter { font-size: 10px; color: var(--muted); text-align: right; }
    .nick-errmsg  { font-size: 11px; color: var(--red); text-align: center; min-height: 16px; }
    .nick-btn {
      background: linear-gradient(135deg,#C9A84C,#E8C86A); color: #0D1117;
      border: none; border-radius: 12px; padding: 15px;
      font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit;
    }
    .nick-btn:hover { opacity: .9; }

    /* ── 재연결 배너 ── */
    .reconnect-bar {
      background: rgba(248,113,113,.1); border-bottom: 1px solid rgba(248,113,113,.2);
      padding: 7px 16px; font-size: 11px; color: var(--red);
      display: none; align-items: center; gap: 8px; flex-shrink: 0;
    }
    .reconnect-bar.show { display: flex; }

    /* ── 헤더 ── */
    .header {
      background: var(--panel); border-bottom: 1px solid var(--border);
      padding: 12px 16px; display: flex; align-items: center;
      justify-content: space-between; flex-shrink: 0; gap: 10px;
    }
    .header-left { display: flex; align-items: center; gap: 12px; min-width: 0; }
    .back-btn {
      width: 34px; height: 34px; border-radius: 50%;
      background: rgba(255,255,255,.06); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      color: var(--muted); text-decoration: none; font-size: 16px; flex-shrink: 0;
    }
    .ch-name   { font-size: 16px; font-weight: 700; }
    .ch-status { font-size: 11px; color: var(--muted); margin-top: 2px; display: flex; align-items: center; gap: 5px; }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
    .status-dot.live { background: var(--green); animation: livePulse 2s infinite; }
    @keyframes livePulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(74,222,128,.4); }
      50%      { box-shadow: 0 0 0 4px rgba(74,222,128,0); }
    }
    .nick-chip {
      display: flex; align-items: center; gap: 6px;
      background: rgba(201,168,76,.1); border: 1px solid rgba(201,168,76,.25);
      border-radius: 24px; padding: 7px 14px 7px 10px;
      cursor: pointer; flex-shrink: 0; max-width: 140px;
    }
    .nick-chip:hover { background: rgba(201,168,76,.2); }
    .nick-chip-av {
      width: 22px; height: 22px; border-radius: 50%;
      background: linear-gradient(135deg,#C9A84C,#E8C86A);
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; color: #0D1117; flex-shrink: 0;
    }
    .nick-chip-name { font-size: 12px; font-weight: 700; color: var(--gold); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .nick-chip-edit { font-size: 10px; color: var(--gold); opacity: .6; flex-shrink: 0; }

    /* ── 안내 배너 ── */
    .info-banner {
      background: linear-gradient(135deg,rgba(201,168,76,.08),rgba(201,168,76,.04));
      border-bottom: 1px solid rgba(201,168,76,.12);
      padding: 10px 18px; flex-shrink: 0;
      display: flex; align-items: center; gap: 12px;
    }
    .info-banner .icon { font-size: 18px; flex-shrink: 0; }
    .info-banner .text { font-size: 12px; color: var(--gold2); line-height: 1.6; }

    /* ── 오디오 섹션 ── */
    .audio-section {
      background: var(--panel2); border-bottom: 1px solid var(--border);
      padding: 14px 18px; flex-shrink: 0;
    }
    .audio-row { display: flex; align-items: center; gap: 14px; }
    .status-ring {
      width: 54px; height: 54px; border-radius: 50%;
      border: 2px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; flex-shrink: 0; transition: all .3s;
    }
    .status-ring.listening { border-color: var(--green); background: rgba(74,222,128,.08); animation: ringGlow 2s ease-in-out infinite; }
    .status-ring.error     { border-color: var(--red);   background: rgba(248,113,113,.08); }
    @keyframes ringGlow {
      0%,100% { box-shadow: 0 0 12px rgba(74,222,128,.2); }
      50%      { box-shadow: 0 0 28px rgba(74,222,128,.45); }
    }
    .audio-controls { flex: 1; min-width: 0; }
    .status-text { font-size: 12px; color: var(--muted); margin-bottom: 7px; }
    .status-text.active { color: var(--green); }
    .vol-row { display: flex; align-items: center; gap: 10px; }
    .vol-label { font-size: 10px; color: var(--muted); flex-shrink: 0; }
    input[type="range"] { flex: 1; accent-color: var(--gold); height: 4px; cursor: pointer; }
    .vol-bars { display: flex; align-items: flex-end; gap: 3px; height: 18px; margin-top: 5px; }
    .vol-bar  { width: 4px; background: var(--border); border-radius: 3px; height: 3px; transition: height .1s, background .2s; }
    .vol-bar.active { background: linear-gradient(to top, var(--green), #86efac); }
    .btn-connect {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: linear-gradient(135deg,#C9A84C,#E8C86A); color: #0D1117;
      border: none; border-radius: 14px; padding: 11px 18px;
      cursor: pointer; font-family: inherit; white-space: nowrap; flex-shrink: 0; min-width: 76px;
      transition: all .2s; box-shadow: 0 4px 16px rgba(201,168,76,.3);
    }
    .btn-connect .btn-main { font-size: 13px; font-weight: 700; }
    .btn-connect .btn-sub  { font-size: 9px; opacity: .7; margin-top: 2px; }
    .btn-connect:hover { opacity: .9; transform: translateY(-1px); }
    .btn-connect.stop { background: transparent; color: var(--red); border: 1.5px solid var(--red); box-shadow: none; }
    .btn-connect.stop:hover { background: rgba(248,113,113,.1); transform: none; }
    .btn-connect:disabled { opacity: .35; cursor: not-allowed; transform: none; }

    .error-box {
      margin: 6px 16px 0; flex-shrink: 0;
      background: rgba(248,113,113,.08); border: 1px solid rgba(248,113,113,.25);
      border-radius: 10px; padding: 8px 14px; font-size: 11px; color: var(--red); display: none;
    }

    /* ── 채팅 섹션 ── */
    .chat-section { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-height: 0; }
    .chat-header  {
      padding: 7px 14px; background: var(--panel); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; flex-shrink: 0; min-height: 42px;
    }

    /* ── 핵심: chat-body 레이아웃 ── */
    .chat-body {
      flex: 1; display: flex; flex-direction: row;
      overflow: hidden; min-height: 0;
    }
    .chat-left {
      flex: 1 1 auto; min-width: 0;
      overflow-y: auto; padding: 12px 14px;
      display: flex; flex-direction: column; gap: 10px;
      scroll-behavior: smooth;
    }
    .chat-left::-webkit-scrollbar { width: 4px; }
    .chat-left::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1); border-radius: 2px; }

    /* ── 드래그 분할선 ── */
    .resizer {
      flex: 0 0 6px; width: 6px;
      background: var(--border);
      cursor: col-resize;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s;
      position: relative; z-index: 10;
    }
    .resizer:hover { background: rgba(201,168,76,.5); }
    .resizer.active { background: var(--gold); }
    .resizer::after {
      content: '';
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      width: 2px; height: 30px;
      background: rgba(255,255,255,.2); border-radius: 2px;
    }
    .resizer:hover::after  { background: rgba(201,168,76,.7); }
    .resizer.active::after { background: var(--gold); }

    /* ── 접속자 패널 ── */
    .user-panel {
      /* JS가 width 제어 - 초기값만 설정 */
      flex: 0 0 130px; width: 130px;
      min-width: 60px; max-width: 50vw;
      display: flex; flex-direction: column;
      background: var(--panel2); overflow: hidden;
    }
    .user-panel-hd {
      padding: 8px 10px; border-bottom: 1px solid var(--border);
      font-size: 11px; color: var(--muted);
      display: flex; align-items: center; gap: 5px; flex-shrink: 0;
    }
    .user-cnt {
      margin-left: auto;
      background: rgba(201,168,76,.15); border: 1px solid rgba(201,168,76,.3);
      color: var(--gold); border-radius: 10px; font-size: 10px; padding: 1px 7px; font-weight: 700;
    }
    .user-list  { flex: 1; overflow-y: auto; padding: 5px 0; }
    .user-item  { display: flex; align-items: center; gap: 7px; padding: 6px 10px; transition: background .15s; }
    .user-item:hover { background: rgba(255,255,255,.04); }
    .u-av { width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; flex-shrink: 0; }
    .u-av.admin    { background: rgba(201,168,76,.2); border: 1px solid rgba(201,168,76,.4); color: var(--gold); }
    .u-av.listener { background: rgba(96,165,250,.15); border: 1px solid rgba(96,165,250,.3); color: var(--blue); }
    .u-name { font-size: 11px; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .u-name.is-me  { color: var(--gold); font-weight: 700; }
    .user-empty    { padding: 20px 8px; text-align: center; font-size: 11px; color: var(--muted); line-height: 2; }

    /* ── 입력창 ── */
    .chat-input-area {
      padding: 10px 14px; border-top: 1px solid var(--border);
      display: flex; gap: 8px; align-items: center;
      flex-shrink: 0; background: var(--panel);
    }
    .msg-input {
      flex: 1; min-width: 0; background: rgba(255,255,255,.06);
      border: 1.5px solid var(--border); border-radius: 24px;
      padding: 11px 18px; font-size: 14px; color: var(--text);
      font-family: inherit; outline: none; transition: all .2s;
    }
    .msg-input:focus  { border-color: rgba(201,168,76,.5); }
    .msg-input::placeholder { color: var(--muted); }
    .send-btn {
      width: 42px; height: 42px; flex-shrink: 0;
      background: linear-gradient(135deg,#C9A84C,#E8C86A); color: #0D1117;
      border: none; border-radius: 50%; font-size: 18px; font-weight: 700;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all .2s;
    }
    .send-btn:hover { opacity: .9; transform: scale(1.05); }

    /* ── 말풍선 ── */
    .msg { display: flex; flex-direction: column; gap: 3px; max-width: 88%; }
    .msg.admin, .msg.translator {
      align-self: flex-start;
      background: rgba(201,168,76,.12); border: 1px solid rgba(201,168,76,.18);
      border-radius: 4px 16px 16px 16px; padding: 9px 13px;
    }
    .msg.listener {
      align-self: flex-end;
      background: rgba(96,165,250,.10); border: 1px solid rgba(96,165,250,.18);
      border-radius: 16px 4px 16px 16px; padding: 9px 13px;
    }
    .msg.system {
      align-self: center;
      background: rgba(167,139,250,.08); border: 1px solid rgba(167,139,250,.2);
      border-radius: 20px; padding: 6px 16px; max-width: 100%;
    }
    .msg-sender { font-size: 11px; font-weight: 700; color: var(--gold); margin-bottom: 2px; }
    .msg.listener .msg-sender { color: var(--blue); }
    .msg.system  .msg-sender  { display: none; }
    .msg-text { font-size: 14px; line-height: 1.55; word-break: break-word; }
    .msg.system .msg-text { font-size: 12px; color: var(--muted); text-align: center; }
    .msg-time { font-size: 10px; color: var(--muted); margin-top: 3px; }

    /* ── STT 탭 패널 공통 ── */
    .tab-panel {
      flex: 1 1 auto; min-width: 0;
      overflow-y: auto; padding: 10px 12px;
      display: none; flex-direction: column; gap: 7px;
    }
    .tab-panel.visible { display: flex; }
    .tab-panel::-webkit-scrollbar { width: 4px; }
    .tab-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1); border-radius: 2px; }
    .panel-empty { text-align: center; padding: 30px 10px; font-size: 13px; color: var(--muted); line-height: 1.9; }
    .panel-line  { display: flex; align-items: flex-start; gap: 7px; padding: 8px 10px; border-radius: 10px; line-height: 1.6; }
    .panel-line:hover { background: rgba(255,255,255,.04); }
    .stt-line   { background: rgba(201,168,76,.05); border-left: 2px solid rgba(201,168,76,.3); }
    .trans-line { background: rgba(96,165,250,.05);  border-left: 2px solid rgba(96,165,250,.3); }
    .line-time  { font-size: 10px; color: var(--muted); flex-shrink: 0; margin-top: 2px; min-width: 62px; }
    .line-lang  { font-size: 14px; flex-shrink: 0; font-family: 'Segoe UI Emoji','Apple Color Emoji','Noto Color Emoji',sans-serif; }
    .line-text  { flex: 1; font-size: 13px; color: var(--text); word-break: break-word; }
    .line-conf  { font-size: 9px; flex-shrink: 0; font-weight: 700; min-width: 28px; text-align: right; }

    /* ── 탭 버튼 ── */
    .tab-group  { display: flex; gap: 2px; }
    .tab-btn {
      padding: 5px 12px; border: none; border-radius: 16px;
      font-size: 11px; font-weight: 600; cursor: pointer;
      font-family: inherit; background: transparent; color: var(--muted);
      transition: all .2s; white-space: nowrap;
    }
    .tab-btn:hover  { background: rgba(255,255,255,.06); color: var(--text); }
    .tab-btn.active { background: rgba(201,168,76,.15); color: var(--gold); }
    .tab-new {
      background: var(--red); color: #fff; border-radius: 6px;
      font-size: 8px; padding: 1px 4px; font-weight: 700;
      animation: blink 1s infinite; display: none;
    }
    .tab-new.show { display: inline; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

    @media(max-width:480px) { .user-panel { flex: 0 0 90px; width: 90px; } }
  </style>
</head>
<body>

<!-- 닉네임 모달 -->
<div class="nick-overlay hidden" id="nickOverlay">
  <div class="nick-modal">
    <div class="nick-title" id="nickTitle">🙋 닉네임을 입력해 주세요</div>
    <div class="nick-desc"  id="nickDesc">채팅과 접속자 목록에 표시될 이름입니다.</div>
    <input class="nick-field" type="text" id="nickField" maxlength="10"
           placeholder="닉네임 (2~10자)"
           oninput="nickCnt()"
           onkeydown="if(event.key==='Enter'){event.preventDefault();nickOK();}">
    <div class="nick-counter" id="nickCounter">0 / 10</div>
    <div class="nick-errmsg"  id="nickErr"></div>
    <button class="nick-btn"  id="nickBtn" onclick="nickOK()">입장하기</button>
  </div>
</div>

<!-- 재연결 배너 -->
<div class="reconnect-bar" id="reconnectBar">
  <span>⚡</span><span>서버와 재연결 중...</span>
</div>

<!-- 헤더 -->
<div class="header">
  <div class="header-left">
    <a href="index.html" class="back-btn">←</a>
    <div>
      <div class="ch-name"   id="chName"></div>
      <div class="ch-status">
        <span class="status-dot" id="statusDot"></span>
        <span id="statusLabel"></span>
      </div>
    </div>
  </div>
  <div class="nick-chip" onclick="nickOpen(true)">
    <div class="nick-chip-av"   id="nickChipAv">?</div>
    <span class="nick-chip-name" id="nickChipName">—</span>
    <span class="nick-chip-edit">✎</span>
  </div>
</div>

<!-- 안내 배너 -->
<div class="info-banner" id="infoBanner">
  <span class="icon">🎧</span>
  <span class="text" id="bannerTxt"></span>
</div>

<!-- 오디오 섹션 -->
<div class="audio-section">
  <div class="audio-row">
    <div class="status-ring" id="ring">🎧</div>
    <div class="audio-controls">
      <div class="status-text" id="statusTxt"></div>
      <div class="vol-row">
        <span class="vol-label">VOL</span>
        <input type="range" id="volSlider" min="0" max="1" step="0.05" value="1">
      </div>
      <div class="vol-bars" id="volBars">
        <div class="vol-bar"></div><div class="vol-bar"></div><div class="vol-bar"></div>
        <div class="vol-bar"></div><div class="vol-bar"></div><div class="vol-bar"></div>
        <div class="vol-bar"></div><div class="vol-bar"></div><div class="vol-bar"></div>
        <div class="vol-bar"></div>
      </div>
    </div>
    <button class="btn-connect" id="connectBtn" onclick="toggleConn()">
      <span class="btn-main" id="btnMain"></span>
      <span class="btn-sub"  id="btnSub"></span>
    </button>
  </div>
</div>
<div class="error-box" id="errBox"></div>

<!-- 채팅 섹션 -->
<div class="chat-section">
  <!-- 탭 헤더 -->
  <div class="chat-header">
    <div class="tab-group">
      <button class="tab-btn active" id="tabChat"  onclick="switchTab('chat')">
        💬 <span id="lblChat">Chat</span>
      </button>
      <button class="tab-btn" id="tabStt"   onclick="switchTab('stt')">
        📝 <span id="lblStt">Live Text</span>
        <span class="tab-new" id="badgeStt">NEW</span>
      </button>
      <button class="tab-btn" id="tabTrans" onclick="switchTab('trans')">
        🌐 <span id="lblTrans">Translation</span>
        <span class="tab-new" id="badgeTrans">NEW</span>
      </button>
    </div>
  </div>

  <!-- 본문 -->
  <div class="chat-body" id="chatBody">
    <!-- 채팅 패널 -->
    <div class="chat-left" id="chatBox">
      <div class="msg system">
        <div class="msg-text" id="chatWelcome"></div>
      </div>
    </div>

    <!-- STT 패널 -->
    <div class="tab-panel" id="sttPanel">
      <div class="panel-empty" id="sttEmpty">
        📝 설교 텍스트가 여기에 실시간으로 표시됩니다.<br>
        <span style="font-size:11px;opacity:.6">Sermon text will appear here.</span>
      </div>
    </div>

    <!-- 번역 패널 -->
    <div class="tab-panel" id="transPanel">
      <div class="panel-empty" id="transEmpty">
        🌐 실시간 번역이 여기에 표시됩니다.<br>
        <span style="font-size:11px;opacity:.6">Live translation will appear here.</span>
      </div>
    </div>

    <!-- ★ 드래그 분할선 -->
    <div class="resizer" id="resizer" title="드래그하여 너비 조절 / 더블클릭으로 초기화"></div>

    <!-- 접속자 패널 -->
    <div class="user-panel" id="userPanel">
      <div class="user-panel-hd">
        <span>👥</span>
        <span id="userPanelTitle">접속자</span>
        <span class="user-cnt" id="userCnt">0</span>
      </div>
      <div class="user-list" id="userList">
        <div class="user-empty">접속자 없음</div>
      </div>
    </div>
  </div>

  <!-- 입력창 -->
  <div class="chat-input-area">
    <input class="msg-input" type="text" id="msgInput"
           placeholder="Type a message..." maxlength="300"
           onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChat();}">
    <button class="send-btn" onclick="sendChat()">↑</button>
  </div>
</div>

<script src="/js/stt-tab.js"></script>
<script>
  // ══════════════════════════════════════════════════════════
  // 설정
  // ══════════════════════════════════════════════════════════
  var API_BASE = 'http://' + location.hostname + ':19000';
  var WS_URL   = 'ws://'  + location.hostname + ':19000/ws';

  var CH = {
    english:  { flag:'🇺🇸', name:'English',  lang:'en',
      ui:{ statusWaiting:'Waiting for broadcast', statusOnAir:'● On Air — Live Interpretation',
           statusOffAir:'Off Air', bannerText:'Connect earphones, then tap Listen to start.',
           btnMain:'Listen', btnSub:'Start', btnStopMain:'⏹ Stop', btnStopSub:'Stop',
           statusListening:'● Listening — Live Interpretation', statusStopped:'Listening stopped',
           statusConn:'Connecting...', statusFailed:'Connection failed',
           chatTabLabel:'Chat', sttTabLabel:'Live Text', transTabLabel:'Translation',
           chatWelcome:'Welcome! Chat messages will appear here.',
           msgPh:'Type a message...', panelTitle:'Users' }},
    japanese: { flag:'🇯🇵', name:'日本語',   lang:'ja',
      ui:{ statusWaiting:'放送開始前', statusOnAir:'● 放送中 — 同時通訳',
           statusOffAir:'オフエア', bannerText:'イヤホンを接続してからボタンをタップしてください。',
           btnMain:'聴取開始', btnSub:'Listen', btnStopMain:'⏹ 停止', btnStopSub:'Stop',
           statusListening:'● 聴取中', statusStopped:'停止済み',
           statusConn:'接続中...', statusFailed:'接続失敗',
           chatTabLabel:'チャット', sttTabLabel:'テキスト', transTabLabel:'翻訳',
           chatWelcome:'ようこそ！チャットがここに表示されます。',
           msgPh:'メッセージを入力...', panelTitle:'参加者' }},
    chinese:  { flag:'🇨🇳', name:'中文',     lang:'zh',
      ui:{ statusWaiting:'等待广播', statusOnAir:'● 直播中 — 同声传译',
           statusOffAir:'未开播', bannerText:'请先连接耳机，然后点击按钮开始收听。',
           btnMain:'开始收听', btnSub:'Listen', btnStopMain:'⏹ 停止', btnStopSub:'Stop',
           statusListening:'● 收听中', statusStopped:'已停止',
           statusConn:'连接中...', statusFailed:'连接失败',
           chatTabLabel:'聊天', sttTabLabel:'文字', transTabLabel:'翻译',
           chatWelcome:'欢迎！聊天消息将显示在这里。',
           msgPh:'输入消息...', panelTitle:'参与者' }},
  };

  var params  = new URLSearchParams(location.search);
  var chKey   = CH[params.get('ch')] ? params.get('ch') : 'english';
  var chInfo  = CH[chKey];
  var T       = chInfo.ui;

  document.documentElement.lang = chInfo.lang;
  document.body.classList.add('lang-' + chKey);
  document.title = 'Vitna — ' + chInfo.name;

  function g(id)       { return document.getElementById(id); }
  function st(id, v)   { var e = g(id); if (e) e.textContent = v; }
  function esc(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');
  }

  // 초기 텍스트 설정
  st('chName',         chInfo.flag + ' ' + chInfo.name);
  st('statusLabel',    T.statusWaiting);
  st('bannerTxt',      T.bannerText);
  st('btnMain',        T.btnMain);
  st('btnSub',         T.btnSub);
  st('statusTxt',      T.statusWaiting);
  st('chatWelcome',    T.chatWelcome);
  st('userPanelTitle', T.panelTitle);
  st('lblChat',        T.chatTabLabel);
  st('lblStt',         T.sttTabLabel);
  st('lblTrans',       T.transTabLabel);
  g('msgInput').placeholder = T.msgPh;

  // 볼륨
  var vol = g('volSlider');
  vol.value = parseFloat(localStorage.getItem('vitna_vol') || '1');
  vol.addEventListener('input', function(e) {
    if (audioEl) audioEl.volume = parseFloat(e.target.value);
    localStorage.setItem('vitna_vol', e.target.value);
  });

  // ══════════════════════════════════════════════════════════
  // 탭 전환
  // ══════════════════════════════════════════════════════════
  var curTab = 'chat';
  function switchTab(tab) {
    curTab = tab;
    ['chat','stt','trans'].forEach(function(t) {
      var btn = g('tab' + t.charAt(0).toUpperCase() + t.slice(1));
      if (btn) btn.classList.toggle('active', t === tab);
    });
    g('chatBox').style.display   = tab === 'chat'  ? 'flex' : 'none';
    g('sttPanel').style.display  = tab === 'stt'   ? 'flex' : 'none';
    g('transPanel').style.display= tab === 'trans' ? 'flex' : 'none';
    if (tab === 'stt')   { var b = g('badgeStt');   if (b) b.classList.remove('show'); }
    if (tab === 'trans') { var b = g('badgeTrans');  if (b) b.classList.remove('show'); }
    var activePanel = tab === 'chat' ? g('chatBox') : tab === 'stt' ? g('sttPanel') : g('transPanel');
    if (activePanel) activePanel.scrollTop = activePanel.scrollHeight;
  }

  // ══════════════════════════════════════════════════════════
  // 드래그 분할선 - 완전 새로 구현
  // ══════════════════════════════════════════════════════════
  var rz       = g('resizer');
  var upanel   = g('userPanel');
  var chatBody = g('chatBody');

  var rzDown = false, rzSX = 0, rzSW = 0;
  var RZ_KEY = 'vp_width', RZ_MIN = 60, RZ_MAX = 500;

  function rzApply(w) {
    w = Math.min(RZ_MAX, Math.max(RZ_MIN, w));
    upanel.style.setProperty('flex',      '0 0 ' + w + 'px', 'important');
    upanel.style.setProperty('width',     w + 'px',           'important');
    upanel.style.setProperty('min-width', w + 'px',           'important');
    upanel.style.setProperty('max-width', w + 'px',           'important');
  }

  // 저장 너비 복원
  rzApply(parseInt(localStorage.getItem(RZ_KEY) || '130'));

  rz.addEventListener('mousedown', function(e) {
    rzDown = true;
    rzSX   = e.clientX;
    rzSW   = upanel.offsetWidth;
    rz.classList.add('active');
    document.body.style.cursor     = 'col-resize';
    document.body.style.userSelect = 'none';
    document.body.style.webkitUserSelect = 'none';
    e.preventDefault();
  });

  window.addEventListener('mousemove', function(e) {
    if (!rzDown) return;
    rzApply(rzSW - (e.clientX - rzSX));
  });

  window.addEventListener('mouseup', function(e) {
    if (!rzDown) return;
    rzDown = false;
    rz.classList.remove('active');
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
    document.body.style.webkitUserSelect = '';
    localStorage.setItem(RZ_KEY, upanel.offsetWidth);
  });

  rz.addEventListener('touchstart', function(e) {
    rzDown = true;
    rzSX   = e.touches[0].clientX;
    rzSW   = upanel.offsetWidth;
    rz.classList.add('active');
    e.preventDefault();
  }, { passive: false });

  window.addEventListener('touchmove', function(e) {
    if (!rzDown) return;
    rzApply(rzSW - (e.touches[0].clientX - rzSX));
    e.preventDefault();
  }, { passive: false });

  window.addEventListener('touchend', function() {
    if (!rzDown) return;
    rzDown = false;
    rz.classList.remove('active');
    localStorage.setItem(RZ_KEY, upanel.offsetWidth);
  });

  rz.addEventListener('dblclick', function() {
    rzApply(130);
    localStorage.setItem(RZ_KEY, 130);
  });

  // ══════════════════════════════════════════════════════════
  // 닉네임
  // ══════════════════════════════════════════════════════════
  var myNick = '', myRole = 'listener', nickChanging = false;

  function nickCnt() {
    var v = g('nickField').value;
    st('nickCounter', v.length + ' / 10');
    st('nickErr', '');
  }
  function nickOpen(change) {
    nickChanging = change;
    st('nickTitle', change ? '✎ 닉네임 변경' : '🙋 닉네임을 입력해 주세요');
    st('nickBtn',   change ? '변경'         : '입장하기');
    var f = g('nickField');
    f.value = change ? myNick : (localStorage.getItem('vitna_name') || '');
    st('nickErr', ''); st('nickCounter', f.value.length + ' / 10');
    g('nickOverlay').classList.remove('hidden');
    setTimeout(function() { f.focus(); f.select(); }, 80);
  }
  function nickOK() {
    var name = g('nickField').value.trim();
    if (!name)         { st('nickErr', '닉네임을 입력하세요.'); return; }
    if (name.length<2) { st('nickErr', '2자 이상 입력하세요.'); return; }
    myNick = name;
    localStorage.setItem('vitna_name', name);
    st('nickChipName', name);
    var av = g('nickChipAv'); if (av) av.textContent = name[0].toUpperCase();
    g('nickOverlay').classList.add('hidden');
    if (nickChanging && ws && ws.readyState === 1) ws.send(JSON.stringify({type:'set_name', name:name}));
    else if (!ws || ws.readyState !== 1) wsConnect();
  }

  // ══════════════════════════════════════════════════════════
  // WebSocket
  // ══════════════════════════════════════════════════════════
  var ws = null, wsDelay = 2000;
  var displayedKeys = new Set();

  function getMsgKey(d) {
    var t = (d.sentAt || d.sent_at || '').slice(0, 16);
    return (d.senderName || d.sender_name || '') + '::' + (d.message||'') + '::' + t;
  }

  function wsConnect() {
    if (ws && (ws.readyState === 0 || ws.readyState === 1)) return;
    ws = new WebSocket(WS_URL);
    ws.onopen = function() {
      wsDelay = 2000;
      g('reconnectBar').classList.remove('show');
      ws.send(JSON.stringify({ type:'init', channel:chKey, name:myNick }));
    };
    ws.onclose = function() {
      g('reconnectBar').classList.add('show');
      setTimeout(wsConnect, wsDelay);
      wsDelay = Math.min(wsDelay * 2, 30000);
    };
    ws.onerror = function() { ws.close(); };
    ws.onmessage = function(e) {
      try { onMsg(JSON.parse(e.data)); } catch(err) {}
    };
  }
  setInterval(function() {
    if (ws && ws.readyState === 1) try { ws.send(JSON.stringify({type:'ping'})); } catch(e) {}
  }, 30000);

  function onMsg(d) {
    switch(d.type) {
      case 'init_ok':
        myNick = d.name || myNick; myRole = d.role || 'listener';
        st('nickChipName', myNick);
        var av = g('nickChipAv'); if (av && myNick) av.textContent = myNick[0].toUpperCase();
        break;
      case 'name_changed':
        myNick = d.name || myNick; st('nickChipName', myNick);
        var av2 = g('nickChipAv'); if (av2 && myNick) av2.textContent = myNick[0].toUpperCase();
        break;
      case 'state':
        if (d.channels && d.channels[chKey]) updateChState(d.channels[chKey]);
        break;
      case 'channel_update':
        if (d.channel === chKey) updateChState(d.state);
        break;
      case 'chat':
        if (d.channel !== chKey) break;
        appendChat(d);
        break;
      case 'chat_history':
        (d.messages || []).forEach(function(m) {
          appendChat({ senderType:m.sender_type, senderName:m.sender_name,
                       message:m.message, sentAt:m.sent_at });
        });
        break;
      case 'user_list':
        if (!d.channel || d.channel === chKey) renderUsers(d.users || []);
        break;
      case 'listener_update':
        if (!d.channel || d.channel === chKey) st('userCnt', d.count || 0);
        break;
      case 'stt_text':         appendSTT(d);   break;
      case 'stt_history':      (d.transcripts||[]).forEach(appendSTT);   break;
      case 'stt_translation':
        if (!d.channel || d.channel === chKey) appendTrans(d);
        break;
      case 'stt_translation_history':
        (d.translations||[]).forEach(appendTrans); break;
      case 'pong': break;
    }
  }

  function updateChState(s) {
    if (!s) return;
    var dot = g('statusDot'), lbl = g('statusLabel');
    if (s.active) {
      if (lbl) { lbl.textContent = T.statusOnAir; lbl.style.color = 'var(--green)'; }
      if (dot)  dot.classList.add('live');
    } else {
      if (lbl) { lbl.textContent = T.statusOffAir; lbl.style.color = 'var(--muted)'; }
      if (dot)  dot.classList.remove('live');
    }
    var ib = g('infoBanner');
    if (ib) ib.style.display = (s.active || connected) ? 'none' : 'flex';
  }

  function renderUsers(users) {
    st('userCnt', users.length);
    var list = g('userList');
    if (!list) return;
    if (!users.length) { list.innerHTML = '<div class="user-empty">접속자 없음</div>'; return; }
    list.innerHTML = users.map(function(u) {
      var isA = u.role === 'admin' || u.role === 'translator';
      var isM = u.name === myNick;
      return '<div class="user-item' + (isM?' is-me':'') + '">' +
        '<div class="u-av ' + (isA?'admin':'listener') + '">' + esc((u.name||'?')[0].toUpperCase()) + '</div>' +
        '<div style="min-width:0;flex:1">' +
          '<div class="u-name' + (isM?' is-me':'') + '">' + esc(u.name) + '</div>' +
          (isA ? '<div style="font-size:9px;color:var(--gold)">관리자</div>' : '') +
        '</div></div>';
    }).join('');
  }

  function appendChat(d) {
    var key = getMsgKey(d);
    if (displayedKeys.has(key)) return;
    displayedKeys.add(key);
    if (displayedKeys.size > 500) {
      var first = displayedKeys.values().next().value;
      displayedKeys.delete(first);
    }

    var box = g('chatBox');
    if (!box) return;
    var isSys = (d.senderType==='admin'||d.senderType==='system') &&
                (d.senderName==='system'||d.senderName==='시스템');
    var div = document.createElement('div');
    div.className = 'msg ' + (isSys ? 'system' : (d.senderType||'listener'));
    var time = d.sentAt ? new Date(d.sentAt).toLocaleTimeString(chInfo.lang,{hour:'2-digit',minute:'2-digit'}) : '';
    div.innerHTML = isSys
      ? '<div class="msg-text">' + esc(d.message) + '</div>'
      : '<div class="msg-sender">' + esc(d.senderName) + '</div>' +
        '<div class="msg-text">'   + esc(d.message)    + '</div>' +
        '<div class="msg-time">'   + time              + '</div>';
    box.appendChild(div);
    var all = box.querySelectorAll('.msg');
    if (all.length > 200) all[0].remove();
    if (curTab === 'chat') box.scrollTop = box.scrollHeight;
  }

  function sendChat() {
    var el  = g('msgInput');
    var msg = el.value.trim();
    if (!msg || !myNick || !ws || ws.readyState !== 1) return;
    ws.send(JSON.stringify({ type:'chat', message:msg }));
    el.value = '';
  }

  // ── STT/번역 패널 ──────────────────────────────────────────
  function fmtTime(iso) {
    if (!iso) return '';
    return new Date(iso).toLocaleTimeString(chInfo.lang, {hour:'2-digit',minute:'2-digit',second:'2-digit'});
  }
  function langFlag(lang) {
    var m = {en:'🇺🇸',ja:'🇯🇵',zh:'🇨🇳',ko:'🇰🇷','en-US':'🇺🇸','ja-JP':'🇯🇵','zh-CN':'🇨🇳'};
    return m[lang] || '🌐';
  }

  function appendSTT(d) {
    var text = (d.text || d.original_text || '').trim();
    if (!text) return;
    var panel = g('sttPanel'); if (!panel) return;
    var empty = g('sttEmpty'); if (empty) empty.remove();
    var pct = Math.round((d.confidence || 0.9) * 100);
    var col = pct >= 85 ? 'var(--green)' : pct >= 65 ? 'var(--gold)' : 'var(--muted)';
    var div = document.createElement('div');
    div.className = 'panel-line stt-line';
    div.innerHTML = '<span class="line-time">' + fmtTime(d.spokenAt||d.spoken_at) + '</span>' +
                    '<span class="line-lang">🇰🇷</span>' +
                    '<span class="line-text">' + esc(text) + '</span>' +
                    '<span class="line-conf" style="color:' + col + '">' + pct + '%</span>';
    panel.appendChild(div);
    if (panel.querySelectorAll('.panel-line').length > 300) panel.querySelector('.panel-line').remove();
    if (curTab === 'stt') panel.scrollTop = panel.scrollHeight;
    else { var b = g('badgeStt'); if (b) b.classList.add('show'); }
  }

  function appendTrans(d) {
    var text = (d.translatedText || d.translated_text || '').trim();
    if (!text) return;
    var panel = g('transPanel'); if (!panel) return;
    var empty = g('transEmpty'); if (empty) empty.remove();
    var div = document.createElement('div');
    div.className = 'panel-line trans-line';
    div.innerHTML = '<span class="line-time">' + fmtTime(d.spokenAt||d.spoken_at) + '</span>' +
                    '<span class="line-lang">' + langFlag(d.targetLanguage||d.target_language) + '</span>' +
                    '<span class="line-text">' + esc(text) + '</span>';
    panel.appendChild(div);
    if (panel.querySelectorAll('.panel-line').length > 300) panel.querySelector('.panel-line').remove();
    if (curTab === 'trans') panel.scrollTop = panel.scrollHeight;
    else { var b = g('badgeTrans'); if (b) b.classList.add('show'); }
  }

  // ══════════════════════════════════════════════════════════
  // LiveKit WebRTC 오디오
  // ══════════════════════════════════════════════════════════
  var connected = false, audioEl = null, volInt = null;
  var ROOM_MAP = { english:'room_en', japanese:'room_ja', chinese:'room_zh' };

  function setRing(cls) { g('ring').className = 'status-ring ' + cls; }
  function showErr(m)   { var b = g('errBox'); b.textContent = m; b.style.display = 'block'; }
  function hideErr()    { g('errBox').style.display = 'none'; }

  function startVol(on) {
    clearInterval(volInt);
    var bars = document.querySelectorAll('.vol-bar');
    if (!on) { bars.forEach(function(b) { b.style.height='3px'; b.classList.remove('active'); }); return; }
    volInt = setInterval(function() {
      bars.forEach(function(b) { b.style.height = (Math.random()*16+3)+'px'; b.classList.add('active'); });
    }, 120);
  }

  // 오디오 attach 헬퍼: 버튼 클릭(startListen) 후에만 호출됨
  function doAttach(track) {
    document.querySelectorAll('audio').forEach(function(a) { a.remove(); });
    audioEl = track.attach();
    audioEl.volume = parseFloat(g('volSlider').value);
    document.body.appendChild(audioEl);
  }

  function toggleConn() { connected ? stopListen() : startListen(); }

  function startListen() {
    hideErr();
    st('statusTxt', T.statusConn);
    g('connectBtn').disabled = true;

    fetch(API_BASE + '/api/v1/livekit/token', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ room: ROOM_MAP[chKey] || 'room_en', role: 'listener' })
    })
    .then(function(r) { if (!r.ok) throw new Error('토큰 발급 실패'); return r.json(); })
    .then(function(td) {
      if (!window.LivekitClient) throw new Error('LiveKit SDK 없음');
      var room = new LivekitClient.Room({ adaptiveStream:true, dynacast:true });

      room.on(LivekitClient.RoomEvent.TrackSubscribed, function(track) {
        if (track.kind === LivekitClient.Track.Kind.Audio) {
          // 트랙 저장만 하고 즉시 재생하지 않음
          // 실제 attach는 Connected 이벤트(버튼 클릭 후)에서 수행
          window._pendingAudioTrack = track;
          if (connected) { doAttach(track); }
        }
      });
      room.on(LivekitClient.RoomEvent.TrackUnsubscribed, function(track) {
        if (track.kind === LivekitClient.Track.Kind.Audio) {
          track.detach().forEach(function(el) { el.remove(); });
          window._pendingAudioTrack = null;
          audioEl = null;
        }
      });

      room.on(LivekitClient.RoomEvent.Connected, function() {
        connected = true;
        st('statusTxt', T.statusListening);
        g('statusTxt').className = 'status-text active';
        setRing('listening');
        startVol(true);
        g('ring').textContent = '🔊';
        g('infoBanner').style.display = 'none';
        st('btnMain', T.btnStopMain); st('btnSub', T.btnStopSub);
        g('connectBtn').className = 'btn-connect stop';
        g('connectBtn').disabled  = false;
        // 버튼 클릭 후 연결 완료 시점에 오디오 attach
        if (window._pendingAudioTrack) { doAttach(window._pendingAudioTrack); }
        fetch(API_BASE + '/api/log/connect', {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({channel:chKey})
        }).catch(function(){});
      });

      room.on(LivekitClient.RoomEvent.Disconnected, function() {
        if (connected) { stopListen(); }
      });

      var srvUrl = (td.data && td.data.server_url) || ('ws://' + location.hostname + ':17880');
      room.connect(srvUrl, td.data && td.data.token);
    })
    .catch(function(err) {
      showErr(T.statusFailed + ': ' + err.message);
      st('statusTxt', T.statusFailed);
      g('statusTxt').className = 'status-text';
      setRing('error');
      g('connectBtn').disabled = false;
    });
  }

  function stopListen() {
    connected = false;
    if (window._pendingAudioTrack) {
      window._pendingAudioTrack.detach().forEach(function(el) { el.remove(); });
      window._pendingAudioTrack = null;
    }
    if (audioEl) { audioEl.srcObject = null; audioEl = null; }
    document.querySelectorAll('audio').forEach(function(a) { a.remove(); });
    clearInterval(volInt);
    st('statusTxt', T.statusStopped);
    g('statusTxt').className = 'status-text';
    setRing('');
    g('ring').textContent = '🎧';
    startVol(false);
    g('infoBanner').style.display = 'flex';
    st('btnMain', T.btnMain); st('btnSub', T.btnSub);
    g('connectBtn').className = 'btn-connect';
    navigator.sendBeacon(API_BASE + '/api/log/disconnect',
      new Blob([JSON.stringify({channel:chKey})], {type:'application/json'}));
  }

  window.addEventListener('beforeunload', function() { if (connected) stopListen(); });

  // ══════════════════════════════════════════════════════════
  // 시작
  // ══════════════════════════════════════════════════════════
  switchTab('chat'); // 초기 탭 설정

  var storedNick = localStorage.getItem('vitna_name');
  if (storedNick && storedNick.length >= 2) {
    myNick = storedNick;
    st('nickChipName', myNick);
    var av = g('nickChipAv'); if (av) av.textContent = myNick[0].toUpperCase();
    wsConnect();
  } else {
    nickOpen(false);
  }
