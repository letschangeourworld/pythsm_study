<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Vitna 관리자 로그인</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    :root{--gold:#C9A84C;--bg:#111827;--panel:#1A2235;--border:#2A3A52;--text:#E8F0FE;--muted:#7A8FA6;--green:#4ADE80;--red:#F87171;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;
         min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
    .box{width:100%;max-width:380px;background:linear-gradient(135deg,#1A2235,#1F2B3E);
         border:1px solid rgba(201,168,76,.2);border-radius:24px;padding:36px 30px;
         box-shadow:0 32px 80px rgba(0,0,0,.6);}
    .hd{text-align:center;margin-bottom:32px;}
    h1{font-size:22px;color:var(--gold);font-weight:700;}
    .sub{font-size:11px;color:var(--muted);margin-top:6px;letter-spacing:1.5px;text-transform:uppercase;}
    .fg{margin-bottom:18px;}
    label{font-size:12px;color:var(--muted);display:block;margin-bottom:7px;}
    input{width:100%;background:rgba(255,255,255,.06);border:1.5px solid var(--border);
      border-radius:12px;padding:13px 16px;font-size:15px;color:var(--text);
      font-family:inherit;outline:none;transition:all .2s;}
    input:focus{border-color:rgba(201,168,76,.5);background:rgba(255,255,255,.09);}
    .btn{width:100%;background:linear-gradient(135deg,#C9A84C,#E8C86A);color:#0D1117;
      border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:700;
      cursor:pointer;font-family:inherit;margin-top:10px;transition:all .2s;}
    .btn:hover{opacity:.9;transform:translateY(-1px);}
    .btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
    .err{background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.3);
      border-radius:10px;padding:11px 14px;font-size:12px;color:var(--red);
      margin-top:14px;display:none;text-align:center;}
    .back{display:block;text-align:center;margin-top:22px;font-size:12px;
      color:var(--muted);text-decoration:none;transition:color .2s;}
    .back:hover{color:var(--text);}
  </style>
</head>
<body>
  <div class="box">
    <div class="hd">
      <div style="font-size:32px;margin-bottom:12px">✝</div>
      <h1>관리자 로그인</h1>
      <p class="sub">Vitna Church — Admin</p>
    </div>
    <div class="fg">
      <label for="username">아이디</label>
      <input type="text" id="username" placeholder="admin" autocomplete="username">
    </div>
    <div class="fg">
      <label for="password">비밀번호</label>
      <input type="password" id="password" placeholder="••••••••"
             autocomplete="current-password"
             onkeydown="if(event.key==='Enter')login()">
    </div>
    <button class="btn" id="loginBtn" onclick="login()">로그인</button>
    <div class="err" id="errorMsg"></div>
    <a href="index.html" class="back">← 메인으로 돌아가기</a>
  </div>
  <script>
    const API_BASE = `http://${location.hostname}:19000`;

    // 이미 로그인된 경우 이동
    const ex = localStorage.getItem('vitna_token');
    if (ex) {
      try {
        const p = JSON.parse(atob(ex.split('.')[1]));
        if (p.exp * 1000 > Date.now()) location.href = 'admin.html';
      } catch {}
    }

    async function login() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const btn      = document.getElementById('loginBtn');
      const err      = document.getElementById('errorMsg');
      if (!username || !password) {
        err.textContent = '아이디와 비밀번호를 입력하세요.';
        err.style.display = 'block'; return;
      }
      btn.disabled = true; btn.textContent = '로그인 중...'; err.style.display = 'none';
      try {
        const res  = await fetch(`${API_BASE}/api/login`, {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({username, password})
        });
        const data = await res.json();
        if (res.ok && data.token) {
          localStorage.setItem('vitna_token', data.token);
          location.href = 'admin.html';
        } else {
          err.textContent = data.error || '로그인 실패';
          err.style.display = 'block';
        }
      } catch {
        err.textContent = '서버에 연결할 수 없습니다.';
        err.style.display = 'block';
      } finally {
        btn.disabled = false; btn.textContent = '로그인';
      }
    }
  </script>
</body>
</html>
