user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    types { font/ttf ttf; font/otf otf; }

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    sendfile on; tcp_nopush on; tcp_nodelay on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    include /etc/nginx/conf.d/*.conf;
}

stream {
    # LiveKit WebSocket TCP → SSL 래핑 (iOS wss:// 지원)
    upstream livekit_tcp {
        server ts_livekit:7881;
    }

    server {
        listen 17443 ssl;
        ssl_certificate     /etc/ssl/vitna/cert.pem;
        ssl_certificate_key /etc/ssl/vitna/key.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        proxy_pass          livekit_tcp;
        proxy_timeout       86400s;
        proxy_connect_timeout 10s;
    }
}
