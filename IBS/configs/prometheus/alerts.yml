groups:
- name: infrastructure
  rules:
  - alert: HighCPU
    expr: avg(rate(node_cpu_seconds_total{mode!="idle"}[5m])) by (instance) > 0.8
    for: 5m
    labels:
      severity: warning
    annotations:
      summary: "CPU 사용률 80% 초과"

  - alert: LiveKitDown
    expr: up{job="livekit"} == 0
    for: 1m
    labels:
      severity: critical
    annotations:
      summary: "LiveKit 서비스 중단"

  - alert: PostgreSQLDown
    expr: up{job="postgres"} == 0
    for: 1m
    labels:
      severity: critical
    annotations:
      summary: "PostgreSQL 서비스 중단"
