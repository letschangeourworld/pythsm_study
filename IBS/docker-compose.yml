networks:
  frontend:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24
  backend:
    driver: bridge
    ipam:
      config:
        - subnet: 172.31.0.0/24
  monitoring:
    driver: bridge
    ipam:
      config:
        - subnet: 172.32.0.0/24

services:

  # ============================================================
  # PostgreSQL 17 + pgvector
  # ============================================================
  postgres:
    image: pgvector/pgvector:pg17
    container_name: ts_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: Asia/Seoul
    ports:
      - "127.0.0.1:15432:5432"
    volumes:
      - /data/postgres:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ============================================================
  # Redis 7 (포트 16379)
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: ts_redis
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --requirepass
      - ${REDIS_PASSWORD}
      - --maxmemory
      - "1gb"
      - --maxmemory-policy
      - "allkeys-lru"
    ports:
      - "127.0.0.1:16379:6379"
    volumes:
      - /data/redis:/data
    networks:
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ============================================================
  # MinIO (포트 19010/19011)
  # ============================================================
  minio:
    image: minio/minio:latest
    container_name: ts_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      TZ: Asia/Seoul
    ports:
      - "127.0.0.1:19010:9000"
      - "19011:9001"
    volumes:
      - /data/minio:/data
    networks:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ============================================================
  # LiveKit SFU (포트 17880/17881)
  # ============================================================
  livekit:
    image: livekit/livekit-server:latest
    container_name: ts_livekit
    restart: unless-stopped
    command: --config /etc/livekit/livekit.yaml
    environment:
      LIVEKIT_KEYS: "translation_api: ${LIVEKIT_API_SECRET}"
    volumes:
      - ./configs/livekit/livekit.yaml:/etc/livekit/livekit.yaml:ro
    ports:
      - "17880:7880"
      - "17881:7881/tcp"
      - "17443:7881/tcp"
      - "55000-55100:55000-55100/udp"
    networks:
      - backend
      - frontend
    depends_on:
      redis:
        condition: service_healthy

  # ============================================================
  # coturn TURN/STUN (포트 13478)
  # ============================================================
  coturn:
    image: coturn/coturn:latest
    container_name: ts_coturn
    restart: unless-stopped
    ports:
      - "13478:3478/tcp"
      - "13478:3478/udp"
    volumes:
      - ./configs/coturn/turnserver.conf:/etc/coturn/turnserver.conf:ro
      - /data/coturn:/var/lib/coturn
    command: -c /etc/coturn/turnserver.conf
    networks:
      - frontend

  # ============================================================
  # Keycloak (포트 19085)
  # ============================================================
  keycloak:
    image: keycloak/keycloak:26.0
    container_name: ts_keycloak
    restart: unless-stopped
    command: start
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://ts_postgres:5432/${POSTGRES_DB}
      KC_DB_USERNAME: ${POSTGRES_USER}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      KC_HEALTH_ENABLED: "true"
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_METRICS_ENABLED: "true"
      KC_PROXY_HEADERS: xforwarded
      TZ: Asia/Seoul
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9000/health/ready >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    ports:
      - "19085:8080"
    volumes:
      - /data/keycloak:/opt/keycloak/data
    networks:
      - backend
    depends_on:
      postgres:
        condition: service_healthy

  # ============================================================
  # FastAPI Backend (포트 19000 → Nginx 경유)
  # ============================================================
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ts_api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: "postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@ts_postgres:5432/${POSTGRES_DB}"
      REDIS_URL: "redis://:${REDIS_PASSWORD}@ts_redis:6379"
      MINIO_ENDPOINT: "ts_minio:9000"
      MINIO_ACCESS_KEY: "${MINIO_ROOT_USER}"
      MINIO_SECRET_KEY: "${MINIO_ROOT_PASSWORD}"
      LIVEKIT_URL: "ws://ts_livekit:7880"
      LIVEKIT_API_KEY: "${LIVEKIT_API_KEY}"
      LIVEKIT_API_SECRET: "${LIVEKIT_API_SECRET}"
      JWT_SECRET: "${JWT_SECRET}"
      SERVER_IP: "${SERVER_IP}"
      PUBLIC_IP: "${SERVER_IP}"
      LOG_LEVEL: "info"
      PORT_MAIN: "19000"
      PORT_ADMIN: "19080"
      PORT_LISTENER: "19081"
      PORT_INTERPRETER: "19082" 
    expose:
      - "8000"
    volumes:
      - ./backend:/app
      - /data/logs/api:/app/logs
    networks:
      - backend
      - frontend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/system/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  # ============================================================
  # Nginx - 포트 기반 라우팅 (19000/19080/19081/19082)
  # ============================================================
  nginx:
    image: nginx:alpine
    container_name: ts_nginx
    restart: unless-stopped
    ports:
      - "19000:19000"
      - "19080:19080"
      - "19081:19081"
      - "19082:19082"
      - "19443:19443"
    volumes:
      - ./configs/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./configs/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./frontend:/usr/share/nginx/html:ro
      - /data/logs/nginx:/var/log/nginx
      - ./configs/ssl:/etc/ssl/vitna:ro
    networks:
      - frontend
      - backend
    depends_on:
      - api

  # ============================================================
  # Prometheus (포트 19090)
  # ============================================================
  prometheus:
    image: prom/prometheus:latest
    container_name: ts_prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
      - --web.enable-lifecycle
    ports:
      - "19090:9090"
    volumes:
      - ./configs/prometheus:/etc/prometheus:ro
      - /data/prometheus:/prometheus
    networks:
      - monitoring
      - backend

  # ============================================================
  # Grafana (포트 19300)
  # ============================================================
  grafana:
    image: grafana/grafana:latest
    container_name: ts_grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_SERVER_HTTP_PORT: "3000"
      GF_SERVER_ROOT_URL: "http://${SERVER_IP}:19300"
      TZ: Asia/Seoul
    ports:
      - "19300:3000"
    volumes:
      - /data/grafana:/var/lib/grafana
      - ./configs/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - monitoring
    depends_on:
      - prometheus

  # ============================================================
  # Loki (내부 전용)
  # ============================================================
  loki:
    image: grafana/loki:2.9.0
    container_name: ts_loki
    restart: unless-stopped
    command: -config.file=/etc/loki/config.yaml
    ports:
      - "127.0.0.1:13100:3100"
    volumes:
      - ./configs/loki/config.yaml:/etc/loki/config.yaml:ro
      - /data/loki:/loki
    networks:
      - monitoring

  # ============================================================
  # Node Exporter (내부 전용)
  # ============================================================
  node-exporter:
    image: prom/node-exporter:latest
    container_name: ts_node_exporter
    restart: unless-stopped
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --path.rootfs=/rootfs
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
    ports:
      - "127.0.0.1:19100:9100"
    networks:
      - monitoring

  # ============================================================
  # PostgreSQL Exporter (내부 전용)
  # ============================================================
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: ts_postgres_exporter
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@ts_postgres:5432/${POSTGRES_DB}?sslmode=disable"
    ports:
      - "127.0.0.1:19187:9187"
    networks:
      - monitoring
      - backend
    depends_on:
      postgres:
        condition: service_healthy

  # ============================================================
  # Redis Exporter (내부 전용)
  # ============================================================
  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: ts_redis_exporter
    restart: unless-stopped
    environment:
      REDIS_ADDR: redis://ts_redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    ports:
      - "127.0.0.1:19121:9121"
    networks:
      - monitoring
      - backend
    depends_on:
      redis:
        condition: service_healthy
